name: Build and Release (TPSCSM L2)

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 nuitka Pillow

      - name: Generate ICO from PNG
        run: |
          python -c "from PIL import Image; Image.open('assets/app_icon.png').save('assets/app_icon.ico', format='ICO', sizes=[(256, 256)])"
        shell: cmd

      - name: Build Main App with Nuitka
        run: |
          python -m nuitka --assume-yes-for-downloads --standalone --windows-console-mode=disable --windows-icon-from-ico=assets/app_icon.ico --enable-plugin=pyside6 --include-data-dir=assets=assets --output-dir=dist main.py

      - name: Prepare Inno Setup Directory
        run: |
          Rename-Item -Path dist\main.dist -NewName MediaTools

      - name: Compile Inno Setup Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows_setup.iss

      - name: Attest Build Provenance (L2 Requirement)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/MediaToolbox-Windows-Setup.exe'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MediaToolbox-Windows-Setup.exe
          generate_release_notes: true
